<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Claude Code Organizer - V3 Redesign Mockup</title>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: light dark;

      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 20px;
      --space-6: 24px;
      --space-7: 28px;
      --space-8: 32px;

      --radius-sm: 10px;
      --radius-md: 14px;
      --radius-lg: 22px;
      --shadow-soft: 0 12px 40px oklch(0.22 0.02 185 / 0.08);
      --shadow-panel: 0 18px 60px oklch(0.18 0.02 185 / 0.12);

      --sidebar-bg: oklch(0.235 0.038 185);
      --sidebar-bg-alt: oklch(0.205 0.028 185);
      --sidebar-hover: oklch(0.28 0.03 185 / 0.78);
      --sidebar-active: oklch(0.34 0.04 185 / 0.84);
      --sidebar-border: oklch(0.38 0.03 185 / 0.22);
      --sidebar-text: oklch(0.82 0.01 185 / 0.72);
      --sidebar-text-soft: oklch(0.86 0.01 185 / 0.54);
      --sidebar-text-bright: oklch(0.97 0.004 185 / 0.96);

      --bg: oklch(0.982 0.004 70);
      --bg-glow: oklch(0.97 0.012 175 / 0.58);
      --surface: oklch(0.998 0.001 70 / 0.86);
      --surface-strong: oklch(0.992 0.002 70 / 0.94);
      --surface-inset: oklch(0.972 0.004 70 / 0.9);
      --surface-muted: oklch(0.988 0.002 70 / 0.72);
      --border: oklch(0.86 0.006 70 / 0.52);
      --border-strong: oklch(0.8 0.006 70 / 0.62);
      --divider: oklch(0.84 0.004 70 / 0.38);

      --text-primary: oklch(0.22 0.012 70);
      --text-secondary: oklch(0.42 0.01 70);
      --text-muted: oklch(0.56 0.008 70);
      --text-faint: oklch(0.7 0.006 70);

      --accent: oklch(0.6 0.15 175);
      --accent-hover: oklch(0.54 0.15 175);
      --accent-light: oklch(0.95 0.04 175 / 0.96);
      --accent-light-strong: oklch(0.92 0.05 175 / 0.96);
      --accent-text: oklch(0.35 0.09 175);

      --tag-global-bg: oklch(0.33 0.06 175);
      --tag-workspace-bg: oklch(0.36 0.06 55);
      --tag-project-bg: oklch(0.35 0.06 145);

      --badge-feedback: oklch(0.67 0.14 70);
      --badge-user: oklch(0.62 0.13 310);
      --badge-project: oklch(0.6 0.13 250);
      --badge-reference: oklch(0.6 0.13 160);
      --badge-skill: oklch(0.66 0.13 45);
      --badge-session: oklch(0.58 0.11 220);

      --danger: oklch(0.58 0.22 25);
      --danger-soft: oklch(0.96 0.03 25 / 0.95);

      --sidebar-width: 260px;
      --detail-width: 340px;
      --cat-sticky-top: 120px;
    }

    body.dark {
      --sidebar-bg: oklch(0.13 0.028 185);
      --sidebar-bg-alt: oklch(0.108 0.02 185);
      --sidebar-hover: oklch(0.19 0.025 185 / 0.86);
      --sidebar-active: oklch(0.24 0.035 185 / 0.92);
      --sidebar-border: oklch(0.33 0.02 185 / 0.2);
      --sidebar-text: oklch(0.8 0.01 185 / 0.72);
      --sidebar-text-soft: oklch(0.86 0.01 185 / 0.52);
      --sidebar-text-bright: oklch(0.96 0.003 185 / 0.94);

      --bg: oklch(0.15 0.008 70);
      --bg-glow: oklch(0.22 0.04 175 / 0.48);
      --surface: oklch(0.2 0.008 70 / 0.86);
      --surface-strong: oklch(0.215 0.008 70 / 0.94);
      --surface-inset: oklch(0.16 0.008 70 / 0.9);
      --surface-muted: oklch(0.19 0.008 70 / 0.72);
      --border: oklch(0.34 0.006 70 / 0.48);
      --border-strong: oklch(0.4 0.008 70 / 0.62);
      --divider: oklch(0.3 0.006 70 / 0.42);

      --text-primary: oklch(0.94 0.004 70);
      --text-secondary: oklch(0.75 0.008 70);
      --text-muted: oklch(0.61 0.008 70);
      --text-faint: oklch(0.48 0.006 70);

      --accent: oklch(0.66 0.14 175);
      --accent-hover: oklch(0.59 0.14 175);
      --accent-light: oklch(0.23 0.04 175 / 0.94);
      --accent-light-strong: oklch(0.28 0.05 175 / 0.96);
      --accent-text: oklch(0.76 0.08 175);

      --badge-feedback: oklch(0.72 0.13 70);
      --badge-user: oklch(0.69 0.12 310);
      --badge-project: oklch(0.69 0.12 250);
      --badge-reference: oklch(0.69 0.12 160);
      --badge-skill: oklch(0.72 0.12 45);
      --badge-session: oklch(0.72 0.1 220);

      --danger-soft: oklch(0.24 0.05 25 / 0.95);
      --shadow-soft: 0 16px 48px oklch(0.04 0.01 185 / 0.34);
      --shadow-panel: 0 24px 80px oklch(0.04 0.01 185 / 0.42);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
    }

    body {
      font-family: "Lato", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 16px;
      line-height: 1.5;
      color: var(--text-primary);
      background:
        radial-gradient(circle at top left, var(--bg-glow), transparent 32%),
        radial-gradient(circle at bottom right, oklch(0.96 0.008 70 / 0.32), transparent 24%),
        var(--bg);
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    body.sidebar-collapsed {
      --sidebar-width: 56px;
    }

    button,
    input {
      font: inherit;
    }

    button {
      color: inherit;
      background: none;
      border: none;
    }

    ::selection {
      background: var(--accent-light-strong);
      color: var(--text-primary);
    }

    :focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .theme-btn {
      position: fixed;
      top: var(--space-4);
      right: var(--space-4);
      z-index: 60;
      min-height: 44px;
      padding: 0 var(--space-4);
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface-strong);
      color: var(--text-secondary);
      box-shadow: var(--shadow-soft);
      cursor: pointer;
      transition: background 180ms ease, border-color 180ms ease, transform 180ms ease;
    }

    .theme-btn:hover {
      background: var(--surface);
      border-color: var(--border-strong);
      transform: translateY(-1px);
    }

    .app {
      display: flex;
      height: 100vh;
      min-height: 100vh;
    }

    .sidebar {
      width: var(--sidebar-width);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      background:
        linear-gradient(180deg, var(--sidebar-bg), var(--sidebar-bg-alt));
      border-right: 1px solid var(--sidebar-border);
      transition: width 240ms cubic-bezier(0.2, 0.8, 0.2, 1), border-color 180ms ease;
      overflow: hidden;
      position: relative;
    }

    .sidebar::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, oklch(1 0 0 / 0.03), transparent 18%),
        radial-gradient(circle at top right, oklch(0.68 0.14 175 / 0.13), transparent 28%);
      pointer-events: none;
    }

    .sidebar-hdr,
    .sidebar-search,
    .sidebar-filters,
    .scope-row,
    .scope-cat {
      position: relative;
      z-index: 1;
    }

    .sidebar-hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-3);
      padding: var(--space-4);
      min-height: 76px;
      border-bottom: 1px solid var(--sidebar-border);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      min-width: 0;
    }

    .sidebar-logo {
      width: 32px;
      height: 32px;
      flex-shrink: 0;
      display: grid;
      place-items: center;
      border-radius: 10px;
      background: linear-gradient(180deg, var(--accent), var(--accent-hover));
      box-shadow: 0 10px 20px oklch(0.28 0.08 175 / 0.35);
    }

    .sidebar-logo svg {
      width: 18px;
      height: 18px;
    }

    .brand-copy {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .brand-title {
      color: var(--sidebar-text-bright);
      font-weight: 900;
      letter-spacing: -0.02em;
    }

    .brand-subtitle {
      color: var(--sidebar-text-soft);
      font-size: 0.875rem;
    }

    .sidebar-toggle,
    .search-trigger,
    .s-pill,
    .scope-row,
    .scope-cat,
    .act-btn,
    .detail-x,
    .d-btn,
    .palette-result {
      min-height: 44px;
    }

    .sidebar-toggle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      padding: 0 var(--space-3);
      border-radius: 999px;
      background: oklch(1 0 0 / 0.08);
      color: var(--sidebar-text);
      cursor: pointer;
      transition: background 180ms ease, color 180ms ease, transform 180ms ease;
      flex-shrink: 0;
    }

    .sidebar-toggle:hover {
      background: oklch(1 0 0 / 0.14);
      color: var(--sidebar-text-bright);
      transform: translateY(-1px);
    }

    .toggle-arrow {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      transition: transform 220ms ease;
    }

    body.sidebar-collapsed .toggle-arrow {
      transform: rotate(180deg);
    }

    .search-trigger {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      margin: var(--space-3) var(--space-3) var(--space-2);
      padding: 0 var(--space-3);
      border-radius: var(--radius-md);
      border: 1px solid var(--sidebar-border);
      background: oklch(0.17 0.02 185 / 0.72);
      color: var(--sidebar-text);
      cursor: pointer;
      transition: background 180ms ease, border-color 180ms ease, transform 180ms ease;
      text-align: left;
      width: calc(100% - 24px);
    }

    body.dark .search-trigger {
      background: oklch(0.1 0.015 185 / 0.84);
    }

    .search-trigger:hover {
      background: oklch(0.19 0.02 185 / 0.88);
      border-color: oklch(0.48 0.04 185 / 0.38);
      transform: translateY(-1px);
    }

    .search-icon {
      font-size: 1rem;
      width: 18px;
      flex-shrink: 0;
    }

    .search-label {
      flex: 1;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--sidebar-text-soft);
    }

    .kbd-badge,
    .kbd-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-1);
      min-width: 48px;
      padding: 0 var(--space-2);
      height: 28px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface-muted);
      color: var(--text-muted);
      font-family: "Geist Mono", monospace;
      font-size: 0.75rem;
      line-height: 1;
      letter-spacing: -0.01em;
      white-space: nowrap;
    }

    .sidebar .kbd-badge {
      border-color: oklch(1 0 0 / 0.08);
      background: oklch(1 0 0 / 0.06);
      color: var(--sidebar-text-soft);
    }

    .sidebar-filters {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
      padding: var(--space-2) var(--space-3) var(--space-4);
      border-bottom: 1px solid oklch(1 0 0 / 0.05);
    }

    .s-pill {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      padding: 0 var(--space-3);
      border-radius: 999px;
      color: var(--sidebar-text-soft);
      background: transparent;
      cursor: pointer;
      transition: background 140ms ease, color 140ms ease, transform 140ms ease;
    }

    .s-pill:hover {
      color: var(--sidebar-text-bright);
      background: var(--sidebar-hover);
      transform: translateY(-1px);
    }

    .s-pill.active {
      background: linear-gradient(180deg, var(--accent), var(--accent-hover));
      color: white;
      box-shadow: 0 8px 18px oklch(0.28 0.08 175 / 0.24);
    }

    .pill-label {
      font-size: 0.94rem;
      line-height: 1;
    }

    .pill-count {
      font-size: 0.8125rem;
      font-weight: 700;
    }

    .sidebar-tree {
      flex: 1;
      overflow: auto;
      padding: var(--space-3) 0 var(--space-6);
      scroll-padding-top: var(--space-5);
    }

    .sidebar-tree::-webkit-scrollbar {
      width: 6px;
    }

    .sidebar-tree::-webkit-scrollbar-thumb {
      background: oklch(1 0 0 / 0.08);
      border-radius: 999px;
    }

    .scope-group {
      padding: 0 var(--space-2) var(--space-1);
    }

    .scope-row {
      width: 100%;
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: 0 var(--space-3);
      border-radius: 16px;
      color: var(--sidebar-text);
      cursor: pointer;
      transition: background 140ms ease, color 140ms ease, transform 140ms ease;
      text-align: left;
    }

    .scope-row:hover {
      background: var(--sidebar-hover);
      color: var(--sidebar-text-bright);
    }

    .scope-row.active {
      background: linear-gradient(180deg, var(--sidebar-active), var(--sidebar-hover));
      color: var(--sidebar-text-bright);
      box-shadow: inset 0 0 0 1px oklch(1 0 0 / 0.05);
    }

    .scope-toggle {
      width: 12px;
      font-size: 0.72rem;
      color: var(--sidebar-text-soft);
      flex-shrink: 0;
      transition: transform 180ms ease;
    }

    .scope-row[data-collapsed="true"] .scope-toggle {
      transform: rotate(-90deg);
    }

    .scope-icon {
      font-size: 1rem;
      width: 20px;
      text-align: center;
      flex-shrink: 0;
    }

    .scope-copy {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex: 1;
    }

    .scope-name {
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .scope-meta {
      font-size: 0.875rem;
      color: var(--sidebar-text-soft);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .scope-tag {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 24px;
      padding: 0 var(--space-2);
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 700;
      color: oklch(0.95 0.005 185);
      flex-shrink: 0;
    }

    .scope-count {
      font-size: 0.875rem;
      color: var(--sidebar-text-soft);
      flex-shrink: 0;
    }

    .scope-children,
    .scope-cats {
      display: grid;
      gap: var(--space-1);
      margin-top: var(--space-1);
      padding-left: var(--space-6);
    }

    .scope-cat {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      padding: 0 var(--space-3);
      border-radius: 12px;
      color: var(--sidebar-text-soft);
      cursor: pointer;
      transition: background 140ms ease, color 140ms ease;
    }

    .scope-cat:hover {
      background: oklch(1 0 0 / 0.06);
      color: var(--sidebar-text-bright);
    }

    .scope-cat span:first-child {
      width: 18px;
      text-align: center;
      flex-shrink: 0;
    }

    .scope-cat-name {
      flex: 1;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 0.9375rem;
    }

    .scope-cat-count {
      font-size: 0.8125rem;
      color: var(--sidebar-text-soft);
      flex-shrink: 0;
    }

    .main-content {
      flex: 1;
      min-width: 0;
      overflow: auto;
      background:
        linear-gradient(180deg, var(--surface), transparent 220px),
        transparent;
      scroll-padding-top: calc(var(--cat-sticky-top) + 20px);
    }

    .main-content::-webkit-scrollbar,
    .detail::-webkit-scrollbar {
      width: 8px;
    }

    .main-content::-webkit-scrollbar-thumb,
    .detail::-webkit-scrollbar-thumb {
      background: var(--divider);
      border-radius: 999px;
    }

    .content-hdr {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: var(--space-5);
      padding: var(--space-7) var(--space-7) var(--space-5);
      border-bottom: 1px solid var(--divider);
      backdrop-filter: blur(18px);
      background: var(--bg);
    }

    .content-headline {
      display: grid;
      gap: var(--space-2);
      min-width: 0;
    }

    .eyebrow {
      color: var(--accent-text);
      font-size: 0.8125rem;
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .content-title-row {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      flex-wrap: wrap;
    }

    .content-title {
      font-size: clamp(1.75rem, 2vw, 2.15rem);
      line-height: 1.1;
      letter-spacing: -0.04em;
      font-weight: 900;
    }

    .content-scope-tag {
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      padding: 0 var(--space-3);
      border-radius: 999px;
      background: var(--accent-light);
      color: var(--accent-text);
      font-size: 0.875rem;
      font-weight: 700;
    }

    .content-summary {
      color: var(--text-secondary);
      max-width: 680px;
    }

    .content-inherit {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: var(--space-2);
    }

    .content-inherit-label {
      color: var(--text-faint);
      font-family: "Geist Mono", monospace;
      font-size: 0.8125rem;
    }

    .c-inherit-pill {
      display: inline-flex;
      align-items: center;
      min-height: 36px;
      padding: 0 var(--space-3);
      border-radius: 999px;
      background: var(--surface-strong);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      font-size: 0.875rem;
      font-weight: 700;
      box-shadow: inset 0 1px 0 oklch(1 0 0 / 0.36);
    }

    .item-list {
      display: grid;
      gap: var(--space-4);
      padding: var(--space-5) var(--space-5) 124px;
    }

    .cat-section {
      display: grid;
      gap: var(--space-2);
    }

    .cat-title {
      position: sticky;
      top: var(--cat-sticky-top);
      z-index: 6;
      display: flex;
      align-items: center;
      gap: var(--space-3);
      width: 100%;
      padding: 0 var(--space-4);
      border-radius: 18px;
      border: 1px solid var(--border);
      background: var(--surface);
      backdrop-filter: blur(16px);
      box-shadow: 0 6px 24px oklch(0.24 0.02 185 / 0.05);
      cursor: pointer;
      text-align: left;
      transition: background 140ms ease, border-color 140ms ease, transform 140ms ease;
    }

    .cat-title:hover {
      background: var(--surface-strong);
      border-color: var(--border-strong);
      transform: translateY(-1px);
    }

    .cat-title-tog {
      width: 16px;
      color: var(--text-faint);
      transition: transform 180ms ease;
      flex-shrink: 0;
    }

    .cat-title[aria-expanded="false"] .cat-title-tog {
      transform: rotate(-90deg);
    }

    .cat-title-ico {
      font-size: 1rem;
      width: 20px;
      text-align: center;
      flex-shrink: 0;
    }

    .cat-title-copy {
      display: flex;
      flex-direction: column;
      gap: 1px;
      min-width: 0;
    }

    .cat-title-nm {
      font-size: 1rem;
      font-weight: 900;
      color: var(--text-secondary);
    }

    .cat-title-sub {
      color: var(--text-faint);
      font-size: 0.875rem;
    }

    .cat-title-cnt {
      margin-left: auto;
      color: var(--text-faint);
      font-family: "Geist Mono", monospace;
      font-size: 0.875rem;
    }

    .cat-body {
      display: grid;
      gap: var(--space-2);
    }

    .cat-body.hidden {
      display: none;
    }

    .bundle-row {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: 0 var(--space-4);
      min-height: 48px;
      margin-left: 28px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: var(--surface-muted);
      color: var(--text-secondary);
    }

    .bundle-row-ico {
      width: 20px;
      text-align: center;
      flex-shrink: 0;
    }

    .bundle-row-copy {
      display: flex;
      align-items: baseline;
      gap: var(--space-2);
      min-width: 0;
      flex: 1;
      flex-wrap: wrap;
    }

    .bundle-row-nm {
      font-weight: 700;
    }

    .bundle-row-src,
    .bundle-row-cnt {
      color: var(--text-faint);
      font-family: "Geist Mono", monospace;
      font-size: 0.8125rem;
    }

    .item {
      display: flex;
      align-items: stretch;
      gap: var(--space-3);
      padding: var(--space-3) var(--space-4);
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface);

      const actions = item.type === "session" ? ["delete"] : item.footer;
      return (
        '<div class="item' + (isSelected ? " selected" : "") + (isChecked ? " checked" : "") + '" data-item-id="' + item.id + '" tabindex="0">' +
          '<div class="item-checkbox">' +
            '<input class="item-chk" type="checkbox" aria-label="Select ' + item.name + '"' + (isChecked ? " checked" : "") + ' data-check-id="' + item.id + '">' +
          "</div>" +
          '<div class="item-ico" aria-hidden="true">' + item.icon + "</div>" +
          '<div class="item-main">' +
            '<div class="item-head">' +
              '<span class="item-name">' + item.name + "</span>" +
              badge +
            "</div>" +
            '<div class="item-desc">' + item.description + "</div>" +
          "</div>" +
          '<div class="item-meta">' + item.meta + "</div>" +
          '<div class="item-actions">' + actions.map(renderActionButton).join("") + "</div>" +
        "</div>"
      );
    }

    function renderSections() {
      itemList.innerHTML = sections.map((section) => {
        const isCollapsed = collapsedSections.has(section.id);
        const bundle = section.bundle
          ? (
            '<div class="bundle-row">' +
              '<span class="bundle-row-ico" aria-hidden="true">' + section.bundle.icon + "</span>" +
              '<div class="bundle-row-copy">' +
                '<span class="bundle-row-nm">' + section.bundle.name + "</span>" +
                '<span class="bundle-row-src">' + section.bundle.source + "</span>" +
              "</div>" +
              '<span class="bundle-row-cnt">' + section.bundle.count + "</span>" +
            "</div>"
          )
          : "";

        return (
          '<section class="cat-section" id="section-' + section.id + '">' +
            '<button class="cat-title" type="button" data-section-toggle="' + section.id + '" aria-expanded="' + String(!isCollapsed) + '">' +
              '<span class="cat-title-tog" aria-hidden="true">▾</span>' +
              '<span class="cat-title-ico" aria-hidden="true">' + section.icon + "</span>" +
              '<span class="cat-title-copy">' +
                '<span class="cat-title-nm">' + section.label + "</span>" +
                '<span class="cat-title-sub">' + section.subtitle + "</span>" +
              "</span>" +
              '<span class="cat-title-cnt">' + section.count + "</span>" +
            "</button>" +
            '<div class="cat-body' + (isCollapsed ? " hidden" : "") + '">' +
              bundle +
              section.items.map(renderItem).join("") +
            "</div>" +
          "</section>"
        );
      }).join("");
    }

    function renderDetail() {
      const item = itemMap.get(selectedItemId);
      if (!item) {
        detailPanel.innerHTML = (
          '<div class="detail-top">' +
            '<div class="detail-title-wrap">' +
              '<span class="detail-kicker">Selection</span>' +
              "<h2>No item selected</h2>" +
              '<p class="detail-subtitle">Pick an item to inspect its metadata and actions.</p>' +
            "</div>" +
            '<button class="detail-x" id="detailClear" type="button" aria-label="Clear selection">✕</button>' +
          "</div>"
        );
        return;
      }

      const typeLabel = item.type === "session" ? "Session" : item.sectionLabel.slice(0, -1);
      const footerActions = item.type === "session"
        ? (
          '<button class="d-btn d-btn-open" type="button">Open transcript</button>' +
          '<button class="d-btn d-btn-del" type="button">Delete</button>'
        )
        : (
          '<button class="d-btn d-btn-open" type="button">Open in Editor</button>' +
          (item.footer.includes("move") ? '<button class="d-btn d-btn-move" type="button">Move to...</button>' : "") +
          (item.footer.includes("delete") ? '<button class="d-btn d-btn-del" type="button">Delete</button>' : "")
        );

      detailPanel.innerHTML = (
        '<div class="detail-top">' +
          '<div class="detail-title-wrap">' +
            '<span class="detail-kicker">' + typeLabel + "</span>" +
            "<h2>" + item.name + "</h2>" +
            '<p class="detail-subtitle">' + item.detailSubtitle + "</p>" +
          "</div>" +
          '<button class="detail-x" id="detailClear" type="button" aria-label="Clear selection">✕</button>' +
        "</div>" +
        '<div class="detail-crumb">' +
          item.breadcrumbs.map((crumb, index) => {
            const separator = index === 0 ? "" : '<span class="crumb-sep">›</span>';
            return separator + '<span class="crumb-pill">' + crumb + "</span>";
          }).join("") +
        "</div>" +
        '<div class="detail-body">' +
          '<div class="d-field">' +
            '<div class="d-label">Type</div>' +
            '<div class="d-value"><span class="item-badge ' + item.badgeClass + '">' + item.badgeLabel + "</span></div>" +
          "</div>" +
          '<div class="d-field">' +
            '<div class="d-label">Description</div>' +
            '<div class="d-value">' + item.description + "</div>" +
          "</div>" +
          '<div class="d-field">' +
            '<div class="d-label">' + (item.type === "session" ? "Session File" : "Path") + "</div>" +
            '<div class="d-path">' + item.path + "</div>" +
          "</div>" +
          '<div class="d-field">' +
            '<div class="d-label">' + (item.type === "session" ? "Created" : "Size / Modified") + "</div>" +
            '<div class="d-value">' + item.secondaryMeta + "</div>" +
          "</div>" +
          '<div class="d-field">' +
            '<div class="d-label">Preview</div>' +
            '<div class="d-preview">' + item.preview + "</div>" +
          "</div>" +
        "</div>" +
        '<div class="detail-footer">' + footerActions + "</div>"
      );
    }

    function updateBatchToolbar() {
      const count = checkedIds.size;
      batchCount.textContent = count + (count === 1 ? " item selected" : " items selected");
      batchToolbar.classList.toggle("visible", count > 0);
      batchToolbar.setAttribute("aria-hidden", count > 0 ? "false" : "true");
    }

    function setSelectedItem(id) {
      if (!itemMap.has(id)) {
        return;
      }
      selectedItemId = id;
      renderSections();
      renderDetail();
    }

    function toggleCheck(id, shouldCheck) {
      if (shouldCheck) {
        checkedIds.add(id);
      } else {
        checkedIds.delete(id);
      }
      renderSections();
      updateBatchToolbar();
    }

    function toggleSection(id) {
      if (collapsedSections.has(id)) {
        collapsedSections.delete(id);
      } else {
        collapsedSections.add(id);
      }
      renderSections();
      syncStickyOffset();
    }

    function applyTheme(theme) {
      document.body.classList.toggle("dark", theme === "dark");
      themeToggle.textContent = document.body.classList.contains("dark") ? "☀ Light" : "◐ Dark";
      safeStore(storageKeys.theme, theme);
      if (paletteOpen) {
        renderPaletteResults();
      }
    }

    function toggleTheme() {
      applyTheme(document.body.classList.contains("dark") ? "light" : "dark");
    }

    function applySidebarState(state) {
      document.body.classList.toggle("sidebar-collapsed", state === "collapsed");
      safeStore(storageKeys.sidebar, state);
      syncStickyOffset();
      if (paletteOpen) {
        renderPaletteResults();
      }
    }

    function toggleSidebar() {
      applySidebarState(document.body.classList.contains("sidebar-collapsed") ? "expanded" : "collapsed");
    }

    function buildPaletteActions() {
      return [
        {
          id: "action-search-memories",
          kind: "action",
          section: "Quick Actions",
          icon: "🧠",
          title: "Jump to Memories",
          subtitle: "Scroll to stored guidance and references",
          meta: "Section",
          run: () => scrollToSection("memories")
        },
        {
          id: "action-search-sessions",
          kind: "action",
          section: "Quick Actions",
          icon: "💬",
          title: "Jump to Sessions",
          subtitle: "Review recent AI conversations in this project",
          meta: "Section",
          run: () => scrollToSection("sessions")
        },
        {
          id: "action-toggle-sidebar",
          kind: "action",
          section: "Quick Actions",
          icon: document.body.classList.contains("sidebar-collapsed") ? "⇢" : "⇠",
          title: document.body.classList.contains("sidebar-collapsed") ? "Expand sidebar" : "Collapse sidebar",
          subtitle: "Toggle the scope rail width",
          meta: "Cmd [",
          run: toggleSidebar
        },
        {
          id: "action-toggle-theme",
          kind: "action",
          section: "Quick Actions",
          icon: document.body.classList.contains("dark") ? "☀" : "◐",
          title: document.body.classList.contains("dark") ? "Switch to light mode" : "Switch to dark mode",
          subtitle: "Toggle the current color scheme",
          meta: "Theme",
          run: toggleTheme
        }
      ];
    }

    function buildPaletteItems() {
      return allItems.map((item) => ({
        id: item.id,
        kind: "item",
        section: "Results",
        icon: item.icon,
        title: item.name,
        subtitle: item.description,
        meta: item.sectionLabel,
        run: () => {
          setSelectedItem(item.id);
          scrollToItem(item.id);
        }
      }));
    }

    function groupBySection(items) {
      const groups = [];
      items.forEach((item) => {
        const last = groups[groups.length - 1];
        if (!last || last.label !== item.section) {
          groups.push({ label: item.section, items: [item] });
        } else {
          last.items.push(item);
        }
      });
      return groups;
    }

    function filterPaletteItems(query) {
      const q = query.trim().toLowerCase();
      const actions = buildPaletteActions();
      const items = buildPaletteItems();

      if (!q) {
        return [...actions, ...items.slice(0, 6)];
      }

      const matches = (entry) => {
        return [entry.title, entry.subtitle, entry.meta]
          .filter(Boolean)
          .some((value) => value.toLowerCase().includes(q));
      };

      return [...actions.filter(matches), ...items.filter(matches)].slice(0, 14);
    }

    function renderPaletteResults() {
      paletteItems = filterPaletteItems(paletteInput.value);
      if (paletteIndex >= paletteItems.length) {
        paletteIndex = Math.max(0, paletteItems.length - 1);
      }
      const groups = groupBySection(paletteItems);

      if (paletteItems.length === 0) {
        paletteResults.innerHTML = '<div class="palette-empty">No matches. Try a broader term or jump to a section instead.</div>';
        return;
      }

      let runningIndex = 0;
      paletteResults.innerHTML = groups.map((group) => {
        const html = group.items.map((item) => {
          const currentIndex = runningIndex++;
          return (
            '<button class="palette-result' + (currentIndex === paletteIndex ? " active" : "") + '" type="button" data-palette-index="' + currentIndex + '">' +
              '<span class="palette-result-icon" aria-hidden="true">' + item.icon + "</span>" +
              '<span class="palette-result-body">' +
                '<span class="palette-result-title">' + item.title + "</span>" +
                '<span class="palette-result-subtitle">' + item.subtitle + "</span>" +
              "</span>" +
              '<span class="palette-result-meta">' + item.meta + "</span>" +
            "</button>"
          );
        }).join("");
        return '<div class="palette-section-label">' + group.label + "</div>" + html;
      }).join("");
    }

    function openPalette() {
      paletteOpen = true;
      paletteBackdrop.classList.add("open");
      paletteBackdrop.setAttribute("aria-hidden", "false");
      paletteInput.value = "";
      paletteIndex = 0;
      renderPaletteResults();
      window.setTimeout(() => paletteInput.focus(), 10);
    }

    function closePalette() {
      paletteOpen = false;
      paletteBackdrop.classList.remove("open");
      paletteBackdrop.setAttribute("aria-hidden", "true");
    }

    function activatePaletteItem(index) {
      const entry = paletteItems[index];
      if (!entry) {
        return;
      }
      closePalette();
      entry.run();
    }

    function scrollToSection(sectionId) {
      const target = document.getElementById("section-" + sectionId);
      if (target) {
        target.scrollIntoView({ block: "start", behavior: "smooth" });
      }
    }

    function scrollToItem(itemId) {
      const target = document.querySelector('[data-item-id="' + itemId + '"]');
      if (target) {
        target.scrollIntoView({ block: "center", behavior: "smooth" });
      }
    }

    function syncStickyOffset() {
      const headerHeight = contentHeader.getBoundingClientRect().height;
      document.documentElement.style.setProperty("--cat-sticky-top", Math.round(headerHeight + 16) + "px");
    }

    itemList.addEventListener("click", (event) => {
      const actionButton = event.target.closest("[data-action]");
      if (actionButton) {
        event.stopPropagation();
        return;
      }

      const sectionButton = event.target.closest("[data-section-toggle]");
      if (sectionButton) {
        toggleSection(sectionButton.getAttribute("data-section-toggle"));
        return;
      }

      const item = event.target.closest("[data-item-id]");
      if (item) {
        setSelectedItem(item.getAttribute("data-item-id"));
      }
    });

    itemList.addEventListener("change", (event) => {
      const checkbox = event.target.closest("[data-check-id]");
      if (!checkbox) {
        return;
      }
      toggleCheck(checkbox.getAttribute("data-check-id"), checkbox.checked);
    });

    itemList.addEventListener("keydown", (event) => {
      const item = event.target.closest("[data-item-id]");
      if (!item) {
        return;
      }
      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        setSelectedItem(item.getAttribute("data-item-id"));
      }
    });

    detailPanel.addEventListener("click", (event) => {
      if (event.target.id === "detailClear") {
        selectedItemId = "";
        renderSections();
        renderDetail();
      }
    });

    searchTrigger.addEventListener("click", openPalette);
    sidebarToggle.addEventListener("click", toggleSidebar);
    themeToggle.addEventListener("click", toggleTheme);

    paletteBackdrop.addEventListener("click", (event) => {
      if (event.target === paletteBackdrop) {
        closePalette();
      }
    });

    paletteResults.addEventListener("click", (event) => {
      const button = event.target.closest("[data-palette-index]");
      if (!button) {
        return;
      }
      activatePaletteItem(Number(button.getAttribute("data-palette-index")));
    });

    paletteInput.addEventListener("input", () => {
      paletteIndex = 0;
      renderPaletteResults();
    });

    paletteInput.addEventListener("keydown", (event) => {
      if (event.key === "ArrowDown") {
        event.preventDefault();
        paletteIndex = Math.min(paletteItems.length - 1, paletteIndex + 1);
        renderPaletteResults();
      } else if (event.key === "ArrowUp") {
        event.preventDefault();
        paletteIndex = Math.max(0, paletteIndex - 1);
        renderPaletteResults();
      } else if (event.key === "Enter") {
        event.preventDefault();
        activatePaletteItem(paletteIndex);
      } else if (event.key === "Escape") {
        event.preventDefault();
        closePalette();
      }
    });

    document.addEventListener("keydown", (event) => {
      const accel = event.metaKey || event.ctrlKey;
      if (accel && event.key.toLowerCase() === "k") {
        event.preventDefault();
        if (paletteOpen) {
          closePalette();
        } else {
          openPalette();
        }
      }

      if (accel && event.key === "[") {
        event.preventDefault();
        toggleSidebar();
      }

      if (event.key === "Escape" && paletteOpen) {
        closePalette();
      }
    });

    window.addEventListener("resize", syncStickyOffset);
    window.addEventListener("load", syncStickyOffset);

    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(syncStickyOffset);
    }

    renderSections();
    renderDetail();
    updateBatchToolbar();
    syncStickyOffset();
    applyTheme(safeRead(storageKeys.theme) || "light");
    applySidebarState(safeRead(storageKeys.sidebar) || "expanded");
  </script>
</body>
</html>
